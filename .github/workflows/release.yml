name: "release"

on:
  workflow_dispatch:
  push:
    tags:
      - "canvaz-v*"

jobs:
  verify-version:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-get
        run: cargo install cargo-get --locked
      - name: Verify tag matches Cargo.toml version
        # Only meaningful on tag builds; manual/branch runs have no version to check.
        if: startsWith(github.ref, 'refs/tags/canvaz-v')
        working-directory: src-tauri
        run: |
          CARGO_VERSION="$(cargo get package.version)"
          TAG_VERSION="${GITHUB_REF_NAME#canvaz-v}"
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Tag version:        $TAG_VERSION"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match Cargo.toml version '$CARGO_VERSION'"
            exit 1
          fi

  release-tauri:
    needs: verify-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: 'macos-latest' # for Arm based macs (M1 and above).
          #   args: '--target aarch64-apple-darwin'
          # - platform: 'macos-latest' # for Intel based macs.
          #   args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          # - platform: 'ubuntu-22.04-arm' # Only available in public repos.
          #   args: ''
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm" # Set this to npm, yarn or pnpm.

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: npm install # change this to npm or pnpm depending on which one you use.

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On a tag build, pin the in-app version to the tag so it isn't marked
          # "-modified" when the CI build step dirties the working tree. Empty on
          # non-tag builds, where build.rs falls back to `git describe`.
          CANVAZ_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        with:
          tagName: canvaz-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "Canvaz v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          # Publish the release (with its artifacts) when building from a release
          # tag; keep branch/manual builds as drafts so they don't publish.
          releaseDraft: ${{ !startsWith(github.ref, 'refs/tags/canvaz-v') }}
          prerelease: false
          args: ${{ matrix.args }}
